        equiBtn.addEventListener('click', () => {
            if (!state.equiInput.width) return;
            
            const direction = state.equiDirection;
            const btnText = direction === 'cube-to-equi' ? '開始轉換全景圖' : '開始轉換 Cube Map';
            setButtonLoading(equiBtn, equiBtnText, true, '轉換中，請稍候...');
            equiResultsContainer.classList.add('hidden');
            
            setTimeout(async () => {
                try {
                    const srcW = state.equiInput.width;
                    const srcH = state.equiInput.height;
                    const targetFormat = equiOutputFormat.value;
                    const isExrOutput = targetFormat === 'exr';

                    let srcData;
                    if (state.equiInput.floatData) {
                        srcData = state.equiInput.floatData;
                    } else {
                        srcData = imageToFloat32(state.equiInput.imageElement, srcW, srcH);
                    }

                    if (direction === 'cube-to-equi') {
                        // ==========================================
                        // Cube Map ➔ 全景圖 (2:1)
                        // ==========================================
                        const fw = Math.floor(srcW / 3);
                        const fh = Math.floor(srcH / 2);

                        const outW = parseInt(equiRes.value, 10);
                        const outH = outW / 2;
                        const outData = new Float32Array(outW * outH * 4);

                        for (let y = 0; y < outH; y++) {
                            const v_equi = y / (outH - 1);
                            const phi = (0.5 - v_equi) * Math.PI; 
                            const sinPhi = Math.sin(phi);
                            const cosPhi = Math.cos(phi);

                            for (let x = 0; x < outW; x++) {
                                const u_equi = x / (outW - 1);
                                const theta = (u_equi - 0.5) * 2 * Math.PI; 

                                const dx = cosPhi * Math.sin(theta);
                                const dy = sinPhi;
                                const dz = cosPhi * Math.cos(theta);

                                const absX = Math.abs(dx);
                                const absY = Math.abs(dy);
                                const absZ = Math.abs(dz);

                                let faceIdx, sc, tc, ma;

                                if (absX >= absY && absX >= absZ) {
                                    ma = absX;
                                    if (dx > 0) { faceIdx = 0; sc = -dz; tc = -dy; } 
                                    else        { faceIdx = 1; sc = dz;  tc = -dy; } 
                                } else if (absY >= absX && absY >= absZ) {
                                    ma = absY;
                                    if (dy > 0) { faceIdx = 2; sc = dx; tc = dz; }   
                                    else        { faceIdx = 3; sc = dx; tc = -dz; }  
                                } else {
                                    ma = absZ;
                                    if (dz > 0) { faceIdx = 4; sc = dx; tc = -dy; }  
                                    else        { faceIdx = 5; sc = -dx; tc = -dy; } 
                                }

                                const faceU = (sc / ma + 1) / 2;
                                const faceV = (tc / ma + 1) / 2;

                                const col = faceIdx % 3;
                                const row = Math.floor(faceIdx / 3);

                                const srcPx = col * fw + faceU * (fw - 1);
                                const srcPy = row * fh + faceV * (fh - 1);

                                const x0 = Math.floor(srcPx);
                                const y0 = Math.floor(srcPy);
                                
                                const clampMaxX = col * fw + fw - 1;
                                const clampMaxY = row * fh + fh - 1;
                                const clampMinX = col * fw;
                                const clampMinY = row * fh;
                                
                                const x1 = Math.min(x0 + 1, clampMaxX);
                                const y1 = Math.min(y0 + 1, clampMaxY);

                                const wx = srcPx - x0;
                                const wy = srcPy - y0;

                                const getVal = (cx, cy, ch) => {
                                    const clampedX = Math.max(clampMinX, Math.min(cx, clampMaxX));
                                    const clampedY = Math.max(clampMinY, Math.min(cy, clampMaxY));
                                    return srcData[(clampedY * srcW + clampedX) * 4 + ch];
                                };

                                const outIdx = (y * outW + x) * 4;
                                for (let c = 0; c < 4; c++) {
                                    const c00 = getVal(x0, y0, c);
                                    const c10 = getVal(x1, y0, c);
                                    const c01 = getVal(x0, y1, c);
                                    const c11 = getVal(x1, y1, c);

                                    const interp = c00 * (1 - wx) * (1 - wy) +
                                                   c10 * wx * (1 - wy) +
                                                   c01 * (1 - wx) * wy +
                                                   c11 * wx * wy;

                                    outData[outIdx + c] = interp;
                                }
                            }
                        }

                        let filename = `${state.equiInput.fileName}_Equirectangular`;
                        let mimeType = 'image/jpeg';
                        
                        if (isExrOutput) {
                            const exrArray = exportFloat32ToEXR(outData, outW, outH);
                            state.equiOutputBlob = new Blob([exrArray], {type: "application/octet-stream"});
                            state.equiOutputFilename = filename + '.exr';
                            
                            const previewData = float32ToImageData(outData, outW, outH);
                            equiResultCanvas.width = outW; equiResultCanvas.height = outH;
                            equiResultCanvas.getContext('2d').putImageData(previewData, 0, 0);
                        } else {
                            mimeType = targetFormat === 'png' ? 'image/png' : 'image/jpeg';
                            state.equiOutputFilename = filename + `.${targetFormat}`;
                            
                            const previewData = float32ToImageData(outData, outW, outH);
                            equiResultCanvas.width = outW; equiResultCanvas.height = outH;
                            equiResultCanvas.getContext('2d').putImageData(previewData, 0, 0);
                            
                            state.equiOutputBlob = await new Promise(resolve => equiResultCanvas.toBlob(resolve, mimeType, 0.95));
                        }

                        equiResultsTitle.textContent = "轉換結果 (Equirectangular)";
                        equiResultsContainer.classList.remove('hidden');
                        showToast("轉換成功！");

                    } else {
                        // ==========================================
                        // 全景圖 (2:1) ➔ Cube Map 3x2
                        // ==========================================
                        const faceSize = parseInt(cubeFaceRes.value, 10);
                        const outW = faceSize * 3;
                        const outH = faceSize * 2;
                        const outData = new Float32Array(outW * outH * 4);

                        for (let y = 0; y < outH; y++) {
                            const row = Math.floor(y / faceSize);
                            const localY = y % faceSize;
                            const v = localY / (faceSize - 1); // 0 to 1
                            const t = 2 * v - 1; // -1 to 1

                            for (let x = 0; x < outW; x++) {
                                const col = Math.floor(x / faceSize);
                                const localX = x % faceSize;
                                const u = localX / (faceSize - 1); // 0 to 1
                                const s = 2 * u - 1; // -1 to 1

                                const faceIdx = row * 3 + col; // 0 to 5
                                let dx = 0, dy = 0, dz = 0;

                                // 嚴格比照 FB / YT 3x2 空間對應
                                switch (faceIdx) {
                                    case 0: // Right (+X)
                                        dx = 1; dy = -t; dz = -s;
                                        break;
                                    case 1: // Left (-X)
                                        dx = -1; dy = -t; dz = s;
                                        break;
                                    case 2: // Up (+Y)
                                        dx = s; dy = 1; dz = t;
                                        break;
                                    case 3: // Down (-Y)
                                        dx = s; dy = -1; dz = -t;
                                        break;
                                    case 4: // Front (+Z)
                                        dx = s; dy = -t; dz = 1;
                                        break;
                                    case 5: // Back (-Z)
                                        dx = -s; dy = -t; dz = -1;
                                        break;
                                }

                                // 向量標準化
                                const len = Math.sqrt(dx*dx + dy*dy + dz*dz);
                                dx /= len;
                                dy /= len;
                                dz /= len;

                                // 計算球面座標系的 2D 全景貼圖索引
                                const phi = Math.asin(Math.max(-1, Math.min(1, dy))); // -PI/2 to PI/2
                                const theta = Math.atan2(dx, dz); // -PI to PI

                                const u_equi = (theta / (2 * Math.PI)) + 0.5; // 0 to 1
                                const v_equi = 0.5 - (phi / Math.PI); // 0 to 1

                                const srcPx = u_equi * (srcW - 1);
                                const srcPy = v_equi * (srcH - 1);

                                // 雙線性插值取樣
                                const x0 = Math.floor(srcPx);
                                const y0 = Math.floor(srcPy);
                                const x1 = Math.min(x0 + 1, srcW - 1);
                                const y1 = Math.min(y0 + 1, srcH - 1);

                                const wx = srcPx - x0;
                                const wy = srcPy - y0;

                                const outIdx = (y * outW + x) * 4;
                                for (let c = 0; c < 4; c++) {
                                    const c00 = srcData[(y0 * srcW + x0) * 4 + c];
                                    const c10 = srcData[(y0 * srcW + x1) * 4 + c];
                                    const c01 = srcData[(y1 * srcW + x0) * 4 + c];
                                    const c11 = srcData[(y1 * srcW + x1) * 4 + c];

                                    const interp = c00 * (1 - wx) * (1 - wy) +
                                                   c10 * wx * (1 - wy) +
                                                   c01 * (1 - wx) * wy +
                                                   c11 * wx * wy;

                                    outData[outIdx + c] = interp;
                                }
                            }
                        }

                        let filename = `${state.equiInput.fileName}_CubeMap_3x2`;
                        let mimeType = 'image/jpeg';

                        if (isExrOutput) {
                            const exrArray = exportFloat32ToEXR(outData, outW, outH);
                            state.equiOutputBlob = new Blob([exrArray], {type: "application/octet-stream"});
                            state.equiOutputFilename = filename + '.exr';

                            const previewData = float32ToImageData(outData, outW, outH);
                            equiResultCanvas.width = outW; equiResultCanvas.height = outH;
                            equiResultCanvas.getContext('2d').putImageData(previewData, 0, 0);
                        } else {
                            mimeType = targetFormat === 'png' ? 'image/png' : 'image/jpeg';
                            state.equiOutputFilename = filename + `.${targetFormat}`;

                            const previewData = float32ToImageData(outData, outW, outH);
                            equiResultCanvas.width = outW; equiResultCanvas.height = outH;
                            equiResultCanvas.getContext('2d').putImageData(previewData, 0, 0);

                            state.equiOutputBlob = await new Promise(resolve => equiResultCanvas.toBlob(resolve, mimeType, 0.95));
                        }

                        equiResultsTitle.textContent = "轉換結果 (3x2 Cube Map)";
                        equiResultsContainer.classList.remove('hidden');
                        showToast("轉換成功！");
                    }

                } catch(err) {
                    console.error(err);
                    showToast("轉換過程發生錯誤: " + err.message, true);
                } finally {
                    setButtonLoading(equiBtn, equiBtnText, false, btnText);
                }
            }, 100);
        });

        equiDownloadBtn.addEventListener('click', () => {
            if (!state.equiOutputBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(state.equiOutputBlob);
            link.download = state.equiOutputFilename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // ==============================================================
        // 360° 預覽模式 (360° Viewer) 邏輯
        // ==============================================================
        
        // 徹底釋放 3D 預覽器持有的所有 GPU/CPU 資源
        function destroy3DViewer() {
            if (activeViewer.animationFrameId) {
                cancelAnimationFrame(activeViewer.animationFrameId);
                activeViewer.animationFrameId = null;
            }
            if (activeViewer.resizeObserver) {
                activeViewer.resizeObserver.disconnect();
                activeViewer.resizeObserver = null;
            }
            if (activeViewer.controls) {
                activeViewer.controls.dispose();
                activeViewer.controls = null;
            }
            if (activeViewer.textures) {
                activeViewer.textures.forEach(t => t.dispose());
                activeViewer.textures = [];
            }
            if (activeViewer.skyboxMesh) {
                activeViewer.skyboxMesh.geometry.dispose();
                if (Array.isArray(activeViewer.skyboxMesh.material)) {
                    activeViewer.skyboxMesh.material.forEach(m => m.dispose());
                } else {
                    activeViewer.skyboxMesh.material.dispose();
                }
                if (activeViewer.scene) {
                    activeViewer.scene.remove(activeViewer.skyboxMesh);
                }
                activeViewer.skyboxMesh = null;
            }
            if (activeViewer.renderer) {
                activeViewer.renderer.dispose();
                const dom = activeViewer.renderer.domElement;
                if (dom && dom.parentNode) {
                    dom.parentNode.removeChild(dom);
                }
                activeViewer.renderer = null;
            }
            activeViewer.scene = null;
            activeViewer.camera = null;
        }

        // 開始渲染虛擬相機循環
        function startViewerAnimation() {
            function animate() {
                if (!activeViewer.renderer || !activeViewer.scene || !activeViewer.camera) return;
                activeViewer.animationFrameId = requestAnimationFrame(animate);
                
                // 自動緩慢水平旋轉
                if (activeViewer.isRotating && activeViewer.skyboxMesh) {
                    activeViewer.skyboxMesh.rotation.y += 0.001;
                }
                
                if (activeViewer.controls) {
                    activeViewer.controls.update();
                }
                activeViewer.renderer.render(activeViewer.scene, activeViewer.camera);
            }
            animate();
        }

        // 初始化並載入 3D 預覽環境
        async function init3DViewer(input) {
            destroy3DViewer(); // 清空舊的

            const parent = document.getElementById('canvas3d-parent');
            parent.innerHTML = ''; // 徹底排空子元素

            const W = input.width;
            const H = input.height;
            const fw = Math.floor(W / 3);
            const fh = Math.floor(H / 2);

            // 1. 建立場景與相機
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, parent.clientWidth / parent.clientHeight, 0.1, 1000);
            // 將相機放在中心，稍微往前看一點以觸發初始渲染方向
            camera.position.set(0, 0, 0.1); 

            // 2. 建立渲染器 (支援高品質消除鋸齒)
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(parent.clientWidth, parent.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // 啟用 ACES 擬真色調映射以提供 EXR 最佳高動態色彩渲染
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            parent.appendChild(renderer.domElement);

            // 3. 設定軌道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            // 由於相機是從盒子「內部」往外看，旋轉速度設定為負值，拖曳方向才符合人眼直覺
            controls.rotateSpeed = -0.4; 
            controls.enableZoom = true;
            controls.minDistance = 0.1;
            controls.maxDistance = 10;
            controls.enablePan = false; // 鎖定相機在原地，僅能旋轉

            // 4. 解析材質與建立網格
            let skyboxMesh;
            const textures = [];

            if (input.layout === 'equirectangular') {
                // ==========================================
                // 處理 2:1 Equirectangular 全景圖
                // ==========================================
                let texture;
                if (input.type === 'exr' && input.floatData) {
                    texture = new THREE.DataTexture(input.floatData, W, H, THREE.RGBAFormat, THREE.FloatType);
                } else {
                    texture = new THREE.Texture(input.imageElement);
                    texture.colorSpace = THREE.SRGBColorSpace;
                }
                texture.needsUpdate = true;
                textures.push(texture);

                // 使用高解析度球體 (64x40 網格) 來保持曲線平滑
                const geometry = new THREE.SphereGeometry(100, 64, 40);
                geometry.scale(-1, 1, 1); // 反轉 X 軸以修正視角並將表面翻轉朝內
                const material = new THREE.MeshBasicMaterial({ map: texture });
                
                skyboxMesh = new THREE.Mesh(geometry, material);
                scene.add(skyboxMesh);

            } else {
                // ==========================================
                // 處理 3x2 Cube Map
                // ==========================================
                if (input.type === 'exr' && input.floatData) {
                    // EXR 模式：抽取 32-bit Float 資料
                    const srcData = input.floatData;
                    for (let i = 0; i < 6; i++) {
                    // SDR 模式：使用 Canvas 分割圖片
                    for (let i = 0; i < 6; i++) {
                        const col = i % 3;
                        const row = Math.floor(i / 3);
                        const canvas = document.createElement('canvas');
                        canvas.width = fw;
                        canvas.height = fh;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(input.imageElement, col * fw, row * fh, fw, fh, 0, 0, fw, fh);
                        
                        const texture = new THREE.CanvasTexture(canvas);
                        texture.colorSpace = THREE.SRGBColorSpace;
                        textures.push(texture);
                    }
                }

                // 5. 建立 3D 立方體並將表面法線翻轉 (反向縮放 X 軸)
                const materials = [];
                for (let i = 0; i < 6; i++) {
                    materials.push(new THREE.MeshBasicMaterial({
                        map: textures[i],
                        side: THREE.DoubleSide
                    }));
                }
                const geometry = new THREE.BoxGeometry(100, 100, 100);
                geometry.scale(-1, 1, 1); 
                
                skyboxMesh = new THREE.Mesh(geometry, materials);
                scene.add(skyboxMesh);
            }

            // 6. 寫入全域狀態管理
            activeViewer.renderer = renderer;
            activeViewer.scene = scene;
            activeViewer.camera = camera;
            activeViewer.controls = controls;
            activeViewer.skyboxMesh = skyboxMesh;
            activeViewer.textures = textures;

            // 7. 綁定按鈕控制事件
            const rotateBtn = document.getElementById('viewer-btn-rotate');
            const resetBtn = document.getElementById('viewer-btn-reset');
            
            function updateRotateBtnUI() {
                rotateBtn.textContent = activeViewer.isRotating ? "🔄 自動旋轉: 開" : "🔄 自動旋轉: 關";
                rotateBtn.className = activeViewer.isRotating 
                    ? "bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 px-3 rounded text-sm transition-colors flex items-center gap-1"
                    : "bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded text-sm transition-colors flex items-center gap-1";
            }
            
            rotateBtn.onclick = () => {
                activeViewer.isRotating = !activeViewer.isRotating;
                updateRotateBtnUI();
            };
            
            resetBtn.onclick = () => {
                controls.reset();
                camera.position.set(0, 0, 0.1);
                controls.target.set(0, 0, 0);
                if (skyboxMesh) {
                    skyboxMesh.rotation.set(0, 0, 0);
                }
            };

            // 預設關閉自動旋轉
            activeViewer.isRotating = false;
            updateRotateBtnUI();

            // 啟動動畫渲染循環
            startViewerAnimation();

            // 監聽尺寸調整，確保全景預覽視窗在 RWD 時不拉伸變形
            const resizeObserver = new ResizeObserver(() => {
                if (activeViewer.renderer && activeViewer.camera) {
                    const width = parent.clientWidth;
                    const height = parent.clientHeight;
                    activeViewer.camera.aspect = width / height;
                    activeViewer.camera.updateProjectionMatrix();
                    activeViewer.renderer.setSize(width, height);
                }
            });
            resizeObserver.observe(parent);
            activeViewer.resizeObserver = resizeObserver;
        }

        // 載入預覽用的 Cube Map 檔案
        async function loadViewerFile(file) {
            if(!file) return;
            
            const ext = file.name.split('.').pop().toLowerCase();
            state.viewerInput.fileName = file.name.replace(`.${ext}`, '');
            state.viewerInput.type = ext === 'exr' ? 'exr' : 'sdr';
            
            try {
                if (state.viewerInput.type === 'exr') {
                    const buffer = await readFileAsArrayBuffer(file);
                    const exrData = exrLoader.parse(buffer);
                    state.viewerInput.width = exrData.width;
                    state.viewerInput.height = exrData.height;
                    state.viewerInput.floatData = normalizeToFloat32(exrData.data);
                    state.viewerInput.imageElement = null;
                } else {
                    const img = await readFileAsImage(file);
                    state.viewerInput.width = img.width;
                    state.viewerInput.height = img.height;
                    state.viewerInput.imageElement = img;
                    state.viewerInput.floatData = null;
                }

                // 自動判斷版型
                const ratio = state.viewerInput.width / state.viewerInput.height;
                if (Math.abs(ratio - 2.0) < 0.1) {
                    state.viewerInput.layout = 'equirectangular';
                } else {
                    state.viewerInput.layout = 'cubemap';
                    if (Math.abs(ratio - 1.5) >= 0.1) {
                        showToast("警告：圖片比例非 3:2 且非 2:1，系統預設以 Cube Map (3x2) 方式處理，可能會有破圖。", false);
                    }
                }

                viewerContainer.classList.remove('hidden');
                
                // 初始化 3D 投影
                await init3DViewer(state.viewerInput);
                const formatText = state.viewerInput.layout === 'equirectangular' ? '2:1 全景圖' : '3x2 Cube Map';
                showToast(`已自動偵測為 ${formatText} 並載入！按住拖曳可調整視角。`);
                
            } catch (err) {
                console.error(err);
                showToast("載入圖片失敗: " + err.message, true);
            }
        }

        viewerUpload.addEventListener('change', (e) => loadViewerFile(e.target.files[0]));
        viewerDropzone.addEventListener('dragover', (e) => { e.preventDefault(); viewerDropzone.classList.add('drag-over'); });
        viewerDropzone.addEventListener('dragleave', (e) => { e.preventDefault(); viewerDropzone.classList.remove('drag-over'); });
        viewerDropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            viewerDropzone.classList.remove('drag-over');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                loadViewerFile(e.dataTransfer.files[0]);
            }
        });

    </script>
</body>
