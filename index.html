    async function handleSourceFileUpload(file, isRestore = false) {
        try {
          const asset = await AssetService.fromFile(file);
          if (asset.layout !== 'equirectangular_2x1') {
            AppStore.set({ sourceAsset: null, sourceLayout: null, faces: Array(6).fill(null), latestOutput: null, finalEquirect: null, composedCube: null, hasDownloadedFaces: false });
            throw new Error(`目前流程只接受 2:1 Equirectangular。偵測到：${asset.layout}`);
          }
          AppStore.set({ sourceAsset: asset, sourceLayout: asset.layout, faces: Array(6).fill(null), latestOutput: null, finalEquirect: null, composedCube: null, hasDownloadedFaces: false });
          AppStore.commit(`已匯入 2:1 全景圖：${asset.fileName}`);
          
          const preview = ColorPipeline.assetToPreviewCanvas(asset);
          preview.className = 'max-w-full h-auto rounded-[20px] shadow-lg border border-[var(--tw-border-color)]';
          const box = Dom.q('#source-preview');
          box.style.display = 'flex'; 
          box.innerHTML = ''; 
          box.appendChild(preview);
          
          renderSplitOrientationPreview();
          UI.renderFaceGrid();
          refreshPreviews();
          if(document.getElementById('app-main')) UI.renderSceneList();
          
          if(!isRestore) {
              UI.toast('2:1 全景圖匯入成功，請進行六面轉換。', 'success');
              scrollToStep('step-convert', true);
          }
        } catch (err) { console.error(err); UI.toast(err.message || '匯入失敗', 'error'); }
    }

    function bindDropzone(dropzone, input, onFiles) {
      if (!dropzone || !input || dropzone.dataset.dropzoneBound === 'true') return;
      dropzone.dataset.dropzoneBound = 'true';
      const openFileDialog = e => { e.preventDefault(); e.stopPropagation(); input.click(); };
      dropzone.addEventListener('click', openFileDialog);
      dropzone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openFileDialog(e); });
      input.addEventListener('click', e => e.stopPropagation());
      input.addEventListener('change', e => {
        const files = Array.from(e.target.files || []);
        if (files.length) onFiles(input.multiple ? files : files[0]);
        input.value = '';
      });
      dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
      dropzone.addEventListener('dragleave', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); });
      dropzone.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        dropzone.classList.remove('drag-over');
        const files = Array.from(e.dataTransfer.files || []);
        if (files.length) onFiles(input.multiple ? files : files[0]);
      });
    }

    function bindFaceEditorEvents() {
      Dom.qa('.face-replace').forEach(input => {
        input.addEventListener('change', async e => {
          if (!e.target.files[0]) return;
          const index = parseInt(e.target.dataset.face, 10);
          const span = Dom.q(`#face-btn-text-${index}`);
          const label = Dom.q(`#label-replace-${index}`);
          if (span && label) {
              label.style.pointerEvents = 'none';
              label.style.opacity = '0.7';
              span.innerHTML = '<span class="loader" style="width:14px;height:14px;border-width:2px;margin-right:6px;"></span>讀取中';
          }
          await new Promise(r => setTimeout(r, 50));
          try {
              await FaceEditor.replaceFace(index, e.target.files[0]);
              UI.toast(`已成功更新 ${CONFIG.faceLabels[index]}`, 'success');
          } catch(err) {
              console.error(err);
              UI.toast(err.message || '更新失敗', 'error');
              if (span) span.innerHTML = '上傳 / 替換';
              if (label) { label.style.pointerEvents = 'auto'; label.style.opacity = '1'; }
          }
        });
      });

    function clampSplitOrientationValue(axis, value) {
      const limits = { yaw: [-180, 180], pitch: [-75, 75], roll: [-180, 180] }[axis] || [-180, 180];
      const n = Number.isFinite(parseFloat(value)) ? parseFloat(value) : 0;
      return Math.max(limits[0], Math.min(limits[1], Math.round(n)));
    }

    function getSplitOrientationSettings() {
      const fallback = AppStore.state.splitOrientation || { yaw: 0, pitch: 0, roll: 0 };
      return {
        yaw: clampSplitOrientationValue('yaw', Dom.q('#split-yaw')?.value ?? fallback.yaw),
        pitch: clampSplitOrientationValue('pitch', Dom.q('#split-pitch')?.value ?? fallback.pitch),
        roll: clampSplitOrientationValue('roll', Dom.q('#split-roll')?.value ?? fallback.roll)
      };
    }

    function setSplitOrientationSettings(orientation = {}, options = {}) {
      const values = {
        yaw: clampSplitOrientationValue('yaw', orientation.yaw ?? 0),
        pitch: clampSplitOrientationValue('pitch', orientation.pitch ?? 0),
        roll: clampSplitOrientationValue('roll', orientation.roll ?? 0)
      };
      const pairs = [
        ['yaw', '#split-yaw', '#split-yaw-num', '#modal-split-yaw', '#modal-split-yaw-num'],
        ['pitch', '#split-pitch', '#split-pitch-num', '#modal-split-pitch', '#modal-split-pitch-num'],
        ['roll', '#split-roll', '#split-roll-num', '#modal-split-roll', '#modal-split-roll-num']
      ];
      pairs.forEach(([axis, ...selectors]) => {
        selectors.forEach(sel => { const el = Dom.q(sel); if (el) el.value = values[axis]; });
      });
      AppStore.state.splitOrientation = values;
      syncSplitOrientationLabels();
      if (options.invalidate !== false) invalidateSplitOrientationOutputs();
      if (options.render !== false) { 
          renderSplitOrientationPreview(); 
          // 檢查如果全螢幕預覽正開著，也要同步重新繪製高解析度畫面
          const modal = Dom.q('#seam-fullscreen-modal');
          if (modal && !modal.classList.contains('hidden')) {
              const container = Dom.q('#seam-fullscreen-container');
              const canvas = renderSplitOrientationCanvas(2048);
              if (canvas && container) {
                  container.innerHTML = '';
                  canvas.className = 'max-w-full max-h-full object-contain rounded-xl shadow-[0_0_40px_rgba(0,0,0,0.8)] border border-white/20';
                  container.appendChild(canvas);
              }
          }
      }
      return values;
    }

    function syncSplitOrientationLabels() {
      const o = getSplitOrientationSettings();
      const targets = [
        ['yaw', o.yaw, '#split-yaw-num', '#modal-split-yaw-num'],
        ['pitch', o.pitch, '#split-pitch-num', '#modal-split-pitch-num'],
        ['roll', o.roll, '#split-roll-num', '#modal-split-roll-num']
      ];
      targets.forEach(([, value, ...selectors]) => {
        selectors.forEach(sel => {
          const el = Dom.q(sel);
          if (!el) return;
          if (el.tagName === 'INPUT') el.value = value;
          else el.textContent = String(value);
        });
      });
    }

    async function uploadEditedFacesBatch(files) {
      const list = Array.from(files || []).slice(0, 6);
      if (!list.length) return;
      const assigned = mapFilesToFaceIndexes(list);
      
      const dzContent = Dom.q('#edited-faces-dz-content');
      const originalHTML = dzContent ? dzContent.innerHTML : '';
      if (dzContent) {
          dzContent.innerHTML = `<div class="loader w-8 h-8 mb-3" style="border-width: 3px;"></div><b style="font-size:18px; color:var(--ink);">處理中... (${assigned.length} 張)</b>`;
      }
      await new Promise(r => setTimeout(r, 50));

      try {
          for (const [index, file] of assigned) {
              await FaceEditor.replaceFace(index, file);
          }
          UI.toast(`已批次上傳 ${assigned.length} 張六面圖。`, 'success');
          if (FaceEditor.hasAllFaces()) scrollToStep('step-merge', true);
      } finally {

          }
      }
    }

    function mapFilesToFaceIndexes(files) {
      const used = new Set();
      const out = [];
      const patterns = [
        [/right|\+x|px|_xpos|posx/i, 0], [/left|\-x|nx|_xneg|negx/i, 1], [/up|\+y|py|_ypos|posy/i, 2],
        [/down|\-y|ny|_yneg|negy/i, 3], [/front|\+z|pz|_zpos|posz/i, 4], [/back|\-z|nz|_zneg|negz/i, 5]
      ];
      files.forEach(file => {
        const hit = patterns.find(([re, idx]) => re.test(file.name) && !used.has(idx));
        if (hit) { used.add(hit[1]); out.push([hit[1], file]); }
      });
      let cursor = 0;
      files.forEach(file => {
        if (out.some(([, f]) => f === file)) return;
        while (used.has(cursor) && cursor < 6) cursor++;
        if (cursor < 6) { used.add(cursor); out.push([cursor, file]); }
      });
      return out;
    }

    function faceToResult(index) {
      const face = AppStore.state.faces[index];
      if (!face) throw new Error(`Face ${index + 1} 尚無素材`);
      const transform = face.transform || FaceTransforms.default();
      const isDefaultTransform = transform.rotate === 0 && !transform.flipH && !transform.flipV;
      if (isDefaultTransform) return { width: face.width, height: face.height, floatData: new Float32Array(face.floatData) };
      const src = ColorPipeline.float32ToCanvas(face.floatData, face.width, face.height, { toneMap: false });
      const transformed = FaceTransforms.applyToCanvas(src, transform);
      return { width: transformed.width, height: transformed.height, floatData: ColorPipeline.imageToFloat32(transformed, transformed.width, transformed.height) };
    }

    function addBleedToFaceResult(result, bleedPx = 0) {
      const bleed = Math.max(0, parseInt(bleedPx, 10) || 0);
      if (!bleed) return result;
      const src = result.floatData;
      const w = result.width; const h = result.height;
      const outW = w + bleed * 2; const outH = h + bleed * 2;
      const out = new Float32Array(outW * outH * 4);
      const copyPixel = (sx, sy, dx, dy) => {
        const clampedX = Math.max(0, Math.min(w - 1, sx));
        const clampedY = Math.max(0, Math.min(h - 1, sy));
        const si = (clampedY * w + clampedX) * 4;
        const di = (dy * outW + dx) * 4;
        out[di] = src[si]; out[di + 1] = src[si + 1]; out[di + 2] = src[si + 2]; out[di + 3] = src[si + 3];
      };
      for (let y = 0; y < outH; y++) {
        for (let x = 0; x < outW; x++) copyPixel(x - bleed, y - bleed, x, y);
      }
      return { width: outW, height: outH, floatData: out, bleedPx: bleed, originalWidth: w, originalHeight: h };
    }

    function faceEdgeToDir(faceIdx, u, v) {
      const s = 2 * u - 1; const t = 2 * v - 1;
      let dx = 0, dy = 0, dz = 0;
      switch (faceIdx) {
        case 0: dx = 1; dy = -t; dz = -s; break;
        case 1: dx = -1; dy = -t; dz = s; break;
        case 2: dx = s; dy = 1; dz = t; break;
        case 3: dx = s; dy = -1; dz = -t; break;
        case 4: dx = s; dy = -t; dz = 1; break;
        case 5: dx = -s; dy = -t; dz = -1; break;
      }
      const len = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
      return { dx: dx / len, dy: dy / len, dz: dz / len };
    }

    function drawEquirectSeamGuide(canvas, orientation = null) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width; const h = canvas.height;
      ctx.save();
      ctx.lineWidth = Math.max(1, Math.round(w / 2048));
      ctx.strokeStyle = 'rgba(255, 80, 0, 0.85)';
      ctx.setLineDash([8, 6]);
      const drawPolyline = points => {
        let started = false; let lastX = null;
        ctx.beginPath();
        points.forEach(p => {
          if (lastX !== null && Math.abs(p.x - lastX) > w * 0.45) { ctx.stroke(); ctx.beginPath(); started = false; }
          if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
          lastX = p.x;
        });
        ctx.stroke();
      };
      for (let f = 0; f < 6; f++) {
        for (const edge of ['top', 'bottom', 'left', 'right']) {
          const pts = []; const n = 160;
          for (let i = 0; i <= n; i++) {
            const a = i / n;
            const u = edge === 'left' ? 0 : edge === 'right' ? 1 : a;
            const v = edge === 'top' ? 0 : edge === 'bottom' ? 1 : a;
            let d = faceEdgeToDir(f, u, v);
            if (orientation) d = ProjectionEngine.rotateDirection(d.dx, d.dy, d.dz, orientation);
            const theta = Math.atan2(d.dx, d.dz);
            const phi = Math.asin(Math.max(-1, Math.min(1, d.dy)));
            pts.push({ x: (theta / (2 * Math.PI) + 0.5) * w, y: (0.5 - phi / Math.PI) * h });
          }
          drawPolyline(pts);
        }
      }
      ctx.restore();
      return canvas;
    }

      }

    function renderFinalPreview() {
      const final = AppStore.state.finalEquirect;
      const box = Dom.q('#final-equi-preview');
      if (!final || !box) return;

    async function downloadFace(index, format = 'png') {
      const bleed = parseInt(Dom.q('#face-bleed-px')?.value || '0', 10);
      const result = addBleedToFaceResult(faceToResult(index), bleed);
      const suffix = bleed ? `_bleed${bleed}px` : '';
      await ExportService.downloadFloatResult(result, `${String(index + 1).padStart(2, '0')}_${CONFIG.faceNames[index]}${suffix}`, format);
    }

    async function downloadFacesZip(format = 'png') {
      if (!AppStore.state.faces.some(Boolean)) throw new Error('目前沒有可下載的六面圖。');
      const zip = new JSZip();
      for (let i = 0; i < 6; i++) {
        if (!AppStore.state.faces[i]) continue;
        const bleed = parseInt(Dom.q('#face-bleed-px')?.value || '0', 10);
        const result = addBleedToFaceResult(faceToResult(i), bleed);
        const blob = await ExportService.floatResultToBlob(result, format);
        const suffix = bleed ? `_bleed${bleed}px` : '';
        zip.file(`${String(i + 1).padStart(2, '0')}_${CONFIG.faceNames[i]}${suffix}.${format}`, blob);
      }
      const manifest = {
        workflow: 'equirectangular_2x1 -> six_faces -> edited_faces -> cubemap_3x2 -> equirectangular_2x1 -> preview',
        faceOrder: CONFIG.faceLabels,
        bleedPx: parseInt(Dom.q('#face-bleed-px')?.value || '0', 10),
        note: 'Use the numbered filenames to re-upload edited faces into the same fixed positions.',
        createdAt: new Date().toISOString()
      };
      zip.file('face_order_manifest.json', JSON.stringify(manifest, null, 2));
      const content = await zip.generateAsync({ type: 'blob' });
      ExportService.downloadBlob(content, `vr360_six_faces_for_editing_${Date.now()}.zip`);
      AppStore.commit(`已下載六面 ZIP：${format.toUpperCase()}`);
      AppStore.state.hasDownloadedFaces = true;
      refreshWorkflowStatus();
      scrollToStep('step-faces-io', true);
    }

    async function mergeFacesToCube(onProgress) {
      if (!FaceEditor.hasAllFaces()) throw new Error('需要完整六面圖才能合併。');
      const cube = await ProjectionEngine.composeFacesToCubemap(AppStore.state.faces, null, onProgress);
      cube.filename = 'edited_cubemap_3x2';
      AppStore.set({ composedCube: cube, latestOutput: cube });
      const canvas = ColorPipeline.float32ToCanvas(cube.floatData, cube.width, cube.height);
      canvas.className = 'max-w-full rounded-[14px] border border-white/80 shadow-md';
      Dom.q('#cubemap-preview').innerHTML = ''; Dom.q('#cubemap-preview').appendChild(canvas);
      AppStore.commit('已將六面合併為 3x2 Cube Map');
      UI.toast('Cube Map 合併完成，請轉回 2:1。', 'success');
    }

    async function convertCubeToFinalEquirect(onProgress) {
      let cube = AppStore.state.composedCube;
      if (!cube) { 
         cube = await ProjectionEngine.composeFacesToCubemap(AppStore.state.faces);
         AppStore.set({ composedCube: cube });
      }
      const res = parseInt(Dom.q('#final-equi-res').value, 10);
      const seamBlendPx = parseInt(Dom.q('#seam-blend-px')?.value || '0', 10);
      AppStore.state.seamBlendPx = seamBlendPx;
      AppStore.state.showSeamGuide = !!Dom.q('#show-seam-guide')?.checked;
      
      const final = await ProjectionEngine.cubemapToEquirect(cube, res, { seamBlendPx, onProgress });
      final.filename = 'edited_equirectangular_2x1';
      AppStore.set({ finalEquirect: final, latestOutput: final });
      
      renderFinalPreview(); updateGeneratedPreviewInfo();
      AppStore.commit(`已將 Cube Map 轉回 2:1 全景圖：${final.width}×${final.height}，Seam Blend ${seamBlendPx}px`);
      UI.toast('最終 2:1 已完成，可載入 360 預覽。', 'success');
      
      UI.renderSceneList();
      expandPreviewPanel();
      scrollToStep('step-preview', true);
    }

    function refreshWorkflowStatus() {
      const facesExist = AppStore.state.faces.some(Boolean);
      const allFaces = FaceEditor.hasAllFaces();
      
      setStepState('upload', AppStore.state.sourceAsset ? 'done' : 'active');
      setStepState('convert', facesExist ? 'done' : (AppStore.state.sourceAsset ? 'active' : 'ready'));
      
      setStepState('download', AppStore.state.hasDownloadedFaces ? 'done' : (facesExist ? 'active' : 'ready'));
      setStepState('reupload', allFaces ? 'done' : (facesExist ? 'active' : 'ready'));
      
      setStepState('merge', AppStore.state.finalEquirect ? 'done' : (allFaces ? 'active' : 'ready'));
      
      setStepState('preview', 'independent');

      const ioPanel = Dom.q('#step-faces-io');
      if (ioPanel) {
        ioPanel.classList.remove('is-done', 'is-active', 'is-locked');
        if (allFaces) ioPanel.classList.add('is-done');
        else if (facesExist) ioPanel.classList.add('is-active');
        else ioPanel.classList.add('is-locked');
      }
    }

        }

        .psv-marker-wrapper:hover .hotspot-tooltip { opacity: 1; visibility: visible; transform: translate3d(-50%, 8px, 0); pointer-events: auto; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.css" />

</head>
<body>
    <div id="loading">
        <div class="spinner mb-4"></div>
        <div style="margin-top: 16px; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">載入 360° 導覽中...</div>
    </div>
    <div id="viewer"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.module.js",

    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { MarkersPlugin } from '@photo-sphere-viewer/markers-plugin';

        const SCENES = ${scenesJson};
        const HOTSPOTS = ${hotspotsJson};
        let viewer;

        let currentSceneId = SCENES[0].id;

        function getSceneUrl(id) {
            const sc = SCENES.find(s => s.id === id);

        }

        function switchScene(sceneId) {
            currentSceneId = sceneId;
            viewer.setPanorama(getSceneUrl(sceneId), { transition: 800, showLoader: true }).then(() => {
                updateMarkers();
            });

        window.addEventListener('trigger-teleport', (e) => {
            switchScene(e.detail);
        });

        function updateMarkers() {
            markersPlugin.clearMarkers();
            const currentHotspots = HOTSPOTS.filter(h => (h.sceneId || 'main') === currentSceneId);
            currentHotspots.forEach(hs => {
                let tooltipHtml = '';
                const typeClass = hs.type === 'teleport' ? 'psv-marker--teleport' : 'psv-marker--info';
                
                if (hs.type === 'teleport') {
                    const targetScene = SCENES.find(s => s.id === hs.targetSceneId);
                    const targetName = targetScene ? targetScene.name : '未知場景';
                    tooltipHtml += \`<div style="font-size:13px; font-weight:800; color:#ff9f0a; margin-bottom:6px; display:flex; align-items:center; gap:6px;"><div style="width:5px; height:12px; background:#ff9f0a; border-radius:2px;"></div> 場景傳送門</div>\`;
                    tooltipHtml += \`<strong style="font-size:18px; font-weight:800; color:#fff; display:block; margin-bottom:16px; word-break:break-all;">\${hs.title || targetName}</strong>\`;

                    tooltipHtml += \`<strong style="font-size:18px; font-weight:800; color:#fff; display:block; word-break:break-all;">\${hs.title}</strong>\`;
                    if (hs.description) tooltipHtml += \`<div style="opacity:0.85; font-size:14.5px; margin-top:8px; white-space:pre-wrap; line-height:1.6; color:#f0f0f5;">\${hs.description}</div>\`;

                    position: { yaw: hs.yaw, pitch: hs.pitch },
                    html: \`
                      <div class="psv-marker-wrapper \${typeClass}">
                         <div class="psv-marker-visual"></div>
                         <div class="hotspot-tooltip" onpointerdown="event.stopPropagation();" onclick="event.stopPropagation();">\${tooltipHtml}</div>
                      </div>

                    size: { width: 44, height: 44 },
                    anchor: 'center center'

            });
        }

        window.onload = () => {
            const container = document.getElementById('viewer');
            viewer = new Viewer({
                container: container,
                panorama: getSceneUrl(currentSceneId),
                navbar: ['zoom', 'fullscreen'],
                defaultPitch: 0,
                defaultYaw: 0,
                plugins: [
                    [MarkersPlugin, { markers: [] }]
                ]
            });
            markersPlugin = viewer.getPlugin(MarkersPlugin);

            viewer.addEventListener('ready', () => {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 500);
                }
                updateMarkers();
            }, { once: true });
        };
    <\/script>
</body>
</html>`;

    async function export360WebPackage() {
        const btn = Dom.q('#btn-export-web-pkg');
        UI.setLoading(btn, true, '打包中...');
        try {
            const scenes = Viewer3D.getAllScenes();
            if (scenes.length === 0) throw new Error("沒有可匯出的場景");

            const processedScenes = [];
            for (const sc of scenes) {
                let base64;
                if (sc.id === 'main') {
                    const asset = await Viewer3D.assetForMainViewer();
                    const canvas = ColorPipeline.float32ToCanvas(asset.floatData, asset.width, asset.height);
                    base64 = canvas.toDataURL('image/jpeg', 0.85);
                } else {
                    base64 = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = e => resolve(e.target.result);
                        reader.readAsDataURL(sc.file);
                    });
                }
                processedScenes.push({ id: sc.id, name: sc.name, isMain: sc.isMain, base64 });
            }

            const htmlContent = generateWebPackageHTML(processedScenes, AppStore.state.hotspots);
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            ExportService.downloadBlob(blob, `vr360_tour_${Date.now()}.html`);
            UI.toast('網頁導覽包下載完成！', 'success');
        } catch (err) {
            UI.toast(err.message, 'error');
        } finally {
            UI.setLoading(btn, false, '一鍵匯出 360 網頁包');
        }
    }

    // 確保物件裡面沒有會導致 Firestore 當機的 undefined 值
    const cleanObjectForFirestore = (obj) => {
        return JSON.parse(JSON.stringify(obj, (k, v) => v === undefined ? null : v));
    };

    async function publishTourToCloud() {
        const btn = Dom.q('#btn-share-online');
        UI.setLoading(btn, true, '發佈中...');
        try {
            if (!auth || !auth.currentUser) {
                await initAuth();
            }
            if (!auth.currentUser) throw new Error("無法取得驗證權限，請稍後再試。");

            const user = auth.currentUser;
            const scenes = Viewer3D.getAllScenes();
            if (scenes.length === 0) throw new Error("沒有可發佈的場景");

            const processedScenes = [];
            for (const sc of scenes) {
                let base64;
                if (sc.id === 'main') {
                    const asset = await Viewer3D.assetForMainViewer();
                    const canvas = ColorPipeline.float32ToCanvas(asset.floatData, asset.width, asset.height);
                    const scale = Math.min(1, 2048 / canvas.width);
                    const resized = document.createElement('canvas');
                    resized.width = canvas.width * scale;
                    resized.height = canvas.height * scale;
                    resized.getContext('2d').drawImage(canvas, 0, 0, resized.width, resized.height);
                    base64 = resized.toDataURL('image/jpeg', 0.8);
                } else {
                    base64 = await new Promise(resolve => {
                        const img = new Image();
                        img.onload = () => {
                            const scale = Math.min(1, 2048 / img.width);
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width * scale;
                            canvas.height = img.height * scale;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = URL.createObjectURL(sc.file);
                    });
                }
                processedScenes.push({ id: sc.id, name: sc.name, isMain: sc.isMain, base64 });
            }

            const tourId = 'tour_' + Date.now().toString(36) + Math.random().toString(36).substring(2, 7);
            
            const cleanHotspots = cleanObjectForFirestore(AppStore.state.hotspots);
            const cleanScenes = cleanObjectForFirestore(processedScenes);

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tours', tourId);
            await setDoc(docRef, {
                scenes: cleanScenes,
                hotspots: cleanHotspots,
                createdAt: new Date().toISOString(),
                ownerId: user.uid
            });

            const shareUrl = window.location.href.split('?')[0] + '?tour=' + tourId;
            Dom.q('#share-url-input').value = shareUrl;
            
            // 檢查是否為本地端 file:/// 協定
            const isLocal = window.location.protocol === 'file:';
            const descEl = Dom.q('#share-modal p.text-\\[var\\(--muted\\)\\]');
            if (isLocal) {
                descEl.innerHTML = '<span class="text-red-400 font-bold">⚠️ 注意：您目前在電腦本機 (file://) 開啟網頁</span><br><br>雖然 360 導覽資料已成功上傳雲端，但下方的本機網址其他人無法存取。<br><span class="text-brand">💡 若要讓親友觀看，請將此 HTML 檔案部署至網路空間 (如 Vercel, Netlify 或 GitHub Pages)，並在線上版本重新發佈。</span>';
            } else {
                descEl.innerHTML = '您的 360° 導覽已上傳至雲端。複製以下網址分享給其他人觀看：';
            }

            Dom.q('#share-modal').classList.remove('hidden');
            UI.toast('發佈成功！', 'success');

        } catch (err) {
            console.error("發佈失敗:", err);
            UI.toast('發佈失敗: ' + err.message, 'error');
        } finally {
            UI.setLoading(btn, false, '發佈到雲端並產生分享網址');
        }
    }

    async function loadCloudTour(tourId) {
        document.body.innerHTML = `
            <div id="loading-overlay" class="fixed inset-0 bg-[#0b0c10] z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
                <div class="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mb-6"></div>
                <div class="text-white font-bold text-lg">載入 360° 導覽中...</div>
            </div>
            <div id="viewer" class="w-full h-screen"></div>
        `;

        try {
            if (!auth || !auth.currentUser) {
                await initAuth();
            }
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tours', tourId);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                throw new Error("找不到此導覽，連結可能已失效。");
            }

            const data = docSnap.data();
            const scenes = data.scenes || [];
            const hotspots = data.hotspots || [];

            if (scenes.length > 0) {
                const htmlContent = generateWebPackageHTML(scenes, hotspots);
                document.open();
                document.write(htmlContent);
                document.close();
            } else {
                 throw new Error("此導覽沒有可用的場景。");
            }

        } catch (e) {
            console.error(e);
            document.getElementById('loading-overlay').innerHTML = `
                <div class="text-xl font-bold text-red-500 mb-4">無法載入導覽</div>
                <div class="text-[var(--muted)]">${e.message}</div>
                <button onclick="window.location.href='?'" class="mt-8 px-6 py-3 bg-brand text-white rounded-full font-bold">建立我的 360°</button>
            `;
        }
    }

    async function initAuth() {
        if (!auth) return;
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    }

    async function restoreState() {
        try {
            const data = await DraftDB.get('workspace');
            if (data) {
                if (data.theme) {
                    document.documentElement.setAttribute('data-theme', data.theme);
                    AppStore.set({ theme: data.theme });
                    Dom.q('#theme-toggle-btn').innerHTML = data.theme === 'dark' ? '☀️ 切換亮色' : '🌙 切換暗色';
                }
                if (data.splitOrientation) AppStore.set({ splitOrientation: data.splitOrientation });
                if (data.hotspots) AppStore.set({ hotspots: data.hotspots });
            }
        } catch(e) {
            console.warn("無法恢復草稿", e);
        }
    }

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const tourId = urlParams.get('tour');

        if (tourId) {
            loadCloudTour(tourId);
        } else {
            renderShell();
            if (auth) {
                initAuth().then(() => restoreState());
            } else {
                restoreState();
            }
        }
    };
  </script>
</body>
</html>
